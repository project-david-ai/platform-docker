use_default_settings: true

server:
  # This key is for searxng internal session signing — separate from the
  # SEARXNG_SECRET_KEY env var used by Docker Compose.
  secret_key: "BEMQzzKgCuYr5Q_h09Y_lw85MNv5pg4BSYITui4PzuQ"
  bind_address: "0.0.0.0"
  port: 8080
  base_url: "http://searxng:8080/"
  image_proxy: false

ui:
  default_theme: simple
  default_locale: en

search:
  safe_search: 0
  default_lang: "en"
  formats:
    - html
    - json

engines:
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    enabled: true

  - name: bing
    engine: bing
    shortcut: bi
    enabled: true

  - name: google
    engine: google
    shortcut: go
    enabled: true

redis:
  url: redis://redis:6379/1

outgoing:
  request_timeout: 15.0
  max_request_timeout: 30.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true